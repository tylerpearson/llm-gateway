{{- if .Values.secretEnv.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "llm-gateway.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llm-gateway.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $val := .Values.secretEnv.values }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
{{- end }}
