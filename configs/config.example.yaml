# Example llm-gateway configuration.
# Copy to configs/config.yaml and adjust. Secrets are never written here; they
# are read from the environment variables named below.

server:
  addr: ":8080"
  read_timeout: 30s
  # read_header_timeout bounds how long the server waits to receive request
  # headers, which protects ingress against slowloris style connection
  # exhaustion. It does not affect the time spent writing a streaming
  # response body.
  read_header_timeout: 10s
  # write_timeout is intentionally 0 so streaming responses are not cut off.
  # If you ever set this to a nonzero value, remember it bounds the entire
  # response, including long lived SSE streams, and will truncate them.
  write_timeout: 0s
  # idle_timeout bounds how long a keep-alive connection may sit idle
  # between requests before it is closed.
  idle_timeout: 120s
  shutdown_timeout: 15s

logging:
  level: info   # debug | info | warn | error
  format: json  # json | text

# Upstream providers. The real API key is read from the named environment
# variable, not stored in this file.
providers:
  anthropic:
    type: anthropic
    base_url: https://api.anthropic.com
    api_key_env: ANTHROPIC_API_KEY
  openai:
    type: openai
    base_url: https://api.openai.com
    api_key_env: OPENAI_API_KEY
  glm:
    type: openai            # GLM exposes an OpenAI compatible endpoint
    base_url: https://open.bigmodel.cn/api/paas/v4
    api_key_env: GLM_API_KEY

# Virtual model aliases mapped to concrete provider + model targets.
routing:
  default_alias: default
  aliases:
    default:
      provider: anthropic
      model: claude-haiku-4-5-20251001
      # Optional ordered failover chain. When the primary target fails with a
      # retryable status (see resilience below), the gateway tries each fallback
      # in turn before the first byte is relayed to the client.
      # fallbacks:
      #   - provider: openai
      #     model: gpt-4o-mini
    fast:
      provider: openai
      model: gpt-4o-mini
    frontier:
      provider: anthropic
      model: claude-opus-4-8
  # Upstream failover. Enabled automatically when any alias declares fallbacks
  # or when this block is present. Retries and fallbacks work without Redis; the
  # cross-replica cooldown (circuit breaker) needs REDIS_ADDR. Omit the block to
  # keep single-attempt behavior. request_timeout defaults to 0 (no added
  # deadline) so streamed responses are never cut off.
  # resilience:
  #   max_retries: 2
  #   retry_backoff: 200ms
  #   request_timeout: 0s
  #   cooldown: 30s
  #   cooldown_threshold: 5
  #   retryable_status: [429, 500, 502, 503, 504]
  #   # Pre-call context-window check: estimate the request size and skip
  #   # candidate models that cannot fit it, failing over to a larger-context
  #   # model or rejecting the request. The estimate is conservative, not exact.
  #   context_check:
  #     enabled: false
  #     chars_per_token: 4
  #     safety_margin: 0.15

# Backend connection strings, resolved from the environment.
storage:
  mysql_dsn_env: MYSQL_DSN
  clickhouse_dsn_env: CLICKHOUSE_DSN
  redis_addr_env: REDIS_ADDR

# Budgets and rate limits, tracked per key and per team in Redis. A value of 0
# means unlimited. mode soft allows the request and reports the breach on the
# x-llm-limit response header; mode hard rejects breaching requests with 429.
limits:
  mode: soft
  per_key:
    requests_per_min: 0
    tokens_per_min: 0
    monthly_usd: 0
  per_team:
    requests_per_min: 0
    tokens_per_min: 0
    monthly_usd: 0

# Hardening. redact_prompts keeps prompt and response content out of logs and
# analytics. The gateway never persists request or response bodies; disabling
# this only enables short debug prompt previews in the logs.
security:
  redact_prompts: true
  # auth_cache_ttl bounds how long a disabled key keeps authenticating after it
  # is revoked with `gatewayctl key disable`: it is the lifetime of a cached key
  # lookup, and so the revocation SLA. Lower it for faster revocation at the cost
  # of more database lookups. 0 (or omitted) uses the gateway default (5s).
  auth_cache_ttl: 5s
