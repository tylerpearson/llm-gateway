# Grafana datasource provisioning for the llm-gateway local dev stack.
#
# This file is loaded automatically on Grafana startup. Changes take effect
# after restarting the grafana container.

apiVersion: 1

datasources:
  # Primary datasource: Prometheus.
  # Provides all Go runtime, process, and business metrics.
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"

  # ClickHouse datasource for FinOps spend dashboards.
  # Requires the grafana-clickhouse-datasource plugin (installed via GF_INSTALL_PLUGINS).
  - name: ClickHouse
    type: grafana-clickhouse-datasource
    uid: clickhouse
    access: proxy
    isDefault: false
    editable: false
    jsonData:
      host: clickhouse
      port: 9000
      username: default
      defaultDatabase: default
      protocol: native
    secureJsonData:
      password: "${CLICKHOUSE_PASSWORD}"
